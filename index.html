<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Log</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<meta name="theme-color" content="#f6f7f9">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--bg:#f6f7f9;--card:#fff;--text:#222;--muted:#666;--soft:#f6f7f9;--line:#e5e7eb;--primary:#222;--primaryText:#fff;--blue1:#cfe3ff;--blue2:#7fb3ff;--blue3:#1f6feb}
body.dark{--bg:#111;--card:#1c1c1e;--text:#eee;--muted:#aaa;--soft:#2a2a2c;--line:#333;--primary:#fff;--primaryText:#111;--blue1:#294766;--blue2:#2864a6;--blue3:#58a6ff}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:520px;margin:0 auto;padding:16px 16px 112px}
header{margin-bottom:16px}h1{margin:0;font-size:28px}header p{margin:6px 0 0;color:var(--muted);font-size:14px}
.card{background:var(--card);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 4px 14px rgba(0,0,0,.06)}
h2{margin:0 0 12px;font-size:18px}label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
input,select{width:100%;box-sizing:border-box;padding:10px 12px;margin-bottom:8px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:var(--card);color:var(--text)}
button{border:none;border-radius:12px;padding:10px 14px;background:#222;color:#fff;font-size:14px;cursor:pointer}
button.secondary{background:#e9ecef;color:#222}body.dark button.secondary{background:#2a2a2c;color:#eee}button.danger{background:#c0392b;color:#fff}.mini{padding:8px 10px;font-size:12px}
.quick-buttons{
  display:flex;
  flex-direction:column;
  gap:4px;
  flex-wrap:wrap;
  margin-top:4px;
}

.quick-buttons button{
  padding:6px 10px;
  font-size:11px;
}
.dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.dashboard-item,.review-item,.ai-review-item{background:var(--soft);border-radius:14px;padding:12px}
.dashboard-label,.dashboard-sub,.review-sub,.streak-sub,.unit,.heatmap-label{color:var(--muted)}.dashboard-label{font-size:13px;margin-bottom:6px}.dashboard-value{font-size:24px;font-weight:800}.dashboard-sub{font-size:12px;margin-top:4px}
.ai-review-list,.review-grid{display:grid;gap:10px}.ai-review-item{font-size:14px;line-height:1.5}.ai-review-title,.review-title{font-weight:800;margin-bottom:6px}.ai-review-good{border-left:5px solid #1f7a3f}.ai-review-warn{border-left:5px solid #b36b00}.ai-review-neutral{border-left:5px solid #777}
.calendar-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.calendar-title{font-weight:800;font-size:18px}.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.calendar-day-name{text-align:center;font-size:12px;color:var(--muted);padding:4px 0}.calendar-day{min-height:42px;border-radius:12px;background:var(--soft);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text);padding:0}.calendar-day.empty{background:transparent}.calendar-day.logged{background:var(--blue1)}body.dark .calendar-day.logged{background:#26364f}.calendar-day.selected{background:var(--primary);color:var(--primaryText)}.calendar-date{font-weight:700}.calendar-dot{font-size:12px;line-height:1;margin-top:2px}
.habit{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}.habit:first-child{border-top:none;margin-top:0;padding-top:0}.habit-head{display:flex;justify-content:space-between;align-items:center;gap:8px}.habit-title{font-weight:700}.field-row{
  display:grid;
  grid-template-columns:
    72px
    minmax(120px,1fr)
    auto
    auto;
  gap:6px;
  align-items:start;
  margin-top:10px;
}

.field-actions{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:center;
}

.field-main{
  display:flex;
  gap:4px;
  align-items:center;
}

.quick-buttons{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.quick-buttons button{
  padding:6px 10px;
  font-size:11px;
}.field-row input{margin-bottom:0}.unit{font-size:13px}.add-field-row{display:grid;grid-template-columns:1fr 70px auto;gap:6px;align-items:center;margin-top:10px}.add-field-row input{margin-bottom:0}
.streak-main{font-size:30px;font-weight:800}.streak-badge{display:inline-block;background:var(--primary);color:var(--primaryText);border-radius:999px;padding:6px 12px;font-size:13px;margin-top:8px}.review-main{font-size:22px;font-weight:800}.review-good{color:#1f7a3f}.review-bad{color:#b03a2e}
.heatmap-label{font-size:13px;margin-bottom:8px}.heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.heatmap-cell{height:28px;border-radius:8px;background:var(--line)}.heatmap-cell.level-1{background:var(--blue1)}.heatmap-cell.level-2{background:var(--blue2)}.heatmap-cell.level-3{background:var(--blue3)}
.graph-btn{background:#e9ecef;color:#222}.graph-btn.active{background:#222;color:#fff}body.dark .graph-btn{background:#2a2a2c;color:#eee}body.dark .graph-btn.active{background:#fff;color:#111}.chart-title{font-weight:700;margin:8px 0 12px;color:var(--text)}.chart-box{position:relative;height:240px;width:100%}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}.history-item{border-top:1px solid var(--line);padding:10px 0;font-size:13px}.history-date{font-weight:700;margin-bottom:4px}
.accordion-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}.accordion-arrow{font-size:14px;transition:transform .2s ease}.accordion-arrow.closed{transform:rotate(-90deg)}.accordion-body.hidden{display:none}
.bottom-nav{position:fixed;bottom:12px;left:0;right:0;max-width:520px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding: 10px 14px calc(30px + env(safe-area-inset-bottom));background:rgba(246,247,249,.92);backdrop-filter:blur(14px);border-top:1px solid #ddd;z-index:100;box-sizing:border-box}body.dark .bottom-nav{background:rgba(17,17,17,.92);border-top:1px solid #333}.bottom-nav button{border-radius:14px;padding:10px 8px;font-size:12px;background:#e9ecef;color:#222}body.dark .bottom-nav button{background:#2a2a2c;color:#eee}.bottom-nav button.active{background:#222;color:#fff}body.dark .bottom-nav button.active{background:#fff;color:#111}.tab-hidden{display:none}.theme-btn{position:fixed;right:16px;bottom:118px;z-index:110;border-radius:999px;width:48px;height:48px;padding:0;font-size:20px;box-shadow:0 4px 14px rgba(0,0,0,.25)}
</style>
</head>
<body>
<div class="app">
<header><h1>Habit Log</h1><p>体調・運動・学習・仕事をシンプルに記録</p></header>
<section class="card"><h2>Dashboard</h2><div id="dashboard"></div></section>
<section class="card"><h2>AI Review</h2><div id="aiReview"></div></section>
<section class="card"><label>記録日</label><input type="date" id="logDate"></section>
<section class="card"><h2>Calendar</h2><div id="calendarBox"></div></section>
<section class="card"><h2>今日の記録</h2><div id="habitList"></div></section>
<section class="card"><h2>項目追加</h2><input id="newHabitName" placeholder="例：ウォーキング"><input id="newFieldNames" placeholder="内訳：時間:分, 距離:km, 速度:mph"><button onclick="addHabit()">追加</button></section>
<section class="card"><h2>Streak</h2><div id="streakBox"></div></section>
<section class="card"><h2>週次レビュー</h2><div id="weeklyReview"></div></section>
<section class="card"><h2>Heatmap</h2><div id="heatmapBox"></div></section>
<section class="card"><h2>月次サマリー</h2><div id="monthlySummary"></div></section>
<section class="card"><h2>グラフ</h2><div class="chart-title" id="chartTitle">表示したい内訳の「グラフ」ボタンを押してください</div><div class="chart-box"><canvas id="habitChart"></canvas></div></section>
<section class="card"><h2>記録履歴</h2><div class="actions"><button onclick="exportCSV()">CSV</button><button onclick="exportJSON()">JSON</button><button onclick="importJSON()">復元</button><button onclick="resetAll()" class="danger">全削除</button></div><input type="file" id="importFile" style="display:none" accept=".json"><div id="history"></div></section>
</div>
<script>
const defaultHabits=[{name:"体重",fields:[{name:"数値",unit:"kg"}]},{name:"体脂肪率",fields:[{name:"数値",unit:"%"}]},{name:"BMI",fields:[{name:"数値",unit:""}]},{name:"睡眠",fields:[{name:"睡眠時刻",unit:""},{name:"起床時刻",unit:""},{name:"睡眠時間",unit:"h"},{name:"睡眠スコア",unit:"点"},{name:"ボディバッテリー",unit:"点"}]},{name:"筋トレ",fields:[{name:"腕立て",unit:"回"},{name:"腹筋",unit:"回"},{name:"背筋",unit:"回"},{name:"スクワット",unit:"回"},{name:"カーフレイズ",unit:"回"},{name:"他トレーニング",unit:""}]},{name:"ウォーキング",fields:[{name:"時間",unit:"分"},{name:"距離",unit:"km"},{name:"速度",unit:"mph"}]},{name:"ランニング",fields:[{name:"時間",unit:"分"},{name:"距離",unit:"km"},{name:"速度",unit:"mph"}]},{name:"英語",fields:[{name:"内容",unit:""},{name:"時間",unit:"分"}]},{name:"読書",fields:[{name:"本・内容",unit:""},{name:"時間",unit:"分"}]},{name:"ゲーム",fields:[{name:"時間",unit:"分"}]},{name:"イベント",fields:[{name:"内容",unit:""}]},{name:"成長",fields:[{name:"気づき",unit:""}]},{name:"勤務",fields:[{name:"勤務方法",unit:""},{name:"勤務時間",unit:"h"}]}];
let habits=JSON.parse(localStorage.getItem("habits"))||defaultHabits,logs=JSON.parse(localStorage.getItem("logs"))||{},selectedChart=JSON.parse(localStorage.getItem("selectedChart"))||null,habitChart=null,activeTab=localStorage.getItem("activeTab")||"home",darkMode=localStorage.getItem("darkMode")==="true";
habits=migrateHabits(habits);
const logDate=document.getElementById("logDate");logDate.value=new Date().toISOString().slice(0,10);logDate.addEventListener("change",render);
function migrateHabits(raw){return raw.map(h=>({name:h.name,fields:h.fields.map(f=>typeof f==="string"?guessFieldObject(h.name,f):{name:f.name,unit:f.unit||""})}))}
function guessFieldObject(c,f){const m={"kg":"kg","%":"%","数値":c==="体重"?"kg":c==="体脂肪率"?"%":"","睡眠時間":"h","睡眠スコア":"点","ボディバッテリー":"点","腕立て":"回","腹筋":"回","背筋":"回","スクワット":"回","カーフレイズ":"回","時間":"分","距離":"km","速度":"mph","勤務時間":"h"};let name=f,unit=m[f]||"";if(c==="体重"&&f==="kg"){name="数値";unit="kg"}if(c==="体脂肪率"&&f==="%"){name="数値";unit="%"}return{name,unit}}
function save(){localStorage.setItem("habits",JSON.stringify(habits));localStorage.setItem("logs",JSON.stringify(logs));localStorage.setItem("selectedChart",JSON.stringify(selectedChart));localStorage.setItem("activeTab",activeTab);localStorage.setItem("darkMode",darkMode)}
function getTodayLog(){const d=logDate.value;if(!logs[d])logs[d]={};return logs[d]}
function render(){applyTheme();renderDashboard();renderAIReview();renderCalendar();renderHabits();renderStreak();renderWeeklyReview();renderHeatmap();renderMonthlySummary();renderChart();renderHistory();setupBottomNav();setupAccordions();setupThemeButton()}
function applyTheme(){document.body.classList.toggle("dark",darkMode)}
function setupThemeButton(){let b=document.getElementById("themeButton");if(!b){b=document.createElement("button");b.id="themeButton";b.className="theme-btn";b.onclick=toggleTheme;document.body.appendChild(b)}b.textContent=darkMode?"☀️":"🌙"}
function toggleTheme(){darkMode=!darkMode;save();render()}
function renderDashboard(){const c=document.getElementById("dashboard");if(!c)return;const d=logDate.value,l=logs[d]||{},w=getStoredValue(d,"体重","数値")||"-",s=getStoredValue(d,"睡眠","睡眠時間")||"-",st=calculateStreak(new Date(d)),ic=countInputs(l),wa=get7DayAverage("体重","数値");c.innerHTML=`<div class="dashboard-grid"><div class="dashboard-item"><div class="dashboard-label">体重</div><div class="dashboard-value">${w}</div><div class="dashboard-sub">kg</div></div><div class="dashboard-item"><div class="dashboard-label">睡眠時間</div><div class="dashboard-value">${s}</div><div class="dashboard-sub">h</div></div><div class="dashboard-item"><div class="dashboard-label">Streak</div><div class="dashboard-value">${st}</div><div class="dashboard-sub">連続記録日数</div></div><div class="dashboard-item"><div class="dashboard-label">今日の入力数</div><div class="dashboard-value">${ic}</div><div class="dashboard-sub">項目</div></div><div class="dashboard-item"><div class="dashboard-label">7日平均体重</div><div class="dashboard-value">${wa!==null?wa.toFixed(1):"-"}</div><div class="dashboard-sub">kg</div></div><div class="dashboard-item"><div class="dashboard-label">記録日</div><div class="dashboard-value">${d.slice(5)}</div><div class="dashboard-sub">selected date</div></div></div>`}
function renderAIReview(){const c=document.getElementById("aiReview");if(!c)return;const r=[],w=get7DayAverage("体重","数値"),sl=get7DayAverage("睡眠","睡眠時間"),walk=get7DayAverage("ウォーキング","距離"),run=get7DayAverage("ランニング","距離"),eng=get7DayAverage("英語","時間"),read=get7DayAverage("読書","時間"),wp=getPrevious7DayAverage("体重","数値"),sp=getPrevious7DayAverage("睡眠","睡眠時間"),walkp=getPrevious7DayAverage("ウォーキング","距離"),engp=getPrevious7DayAverage("英語","時間"),st=calculateStreak(new Date(logDate.value));if(st>=14)r.push({type:"good",title:"継続",text:`${st}日連続で記録できています。これはかなり強い習慣化のサインです。`});else if(st>=7)r.push({type:"good",title:"継続",text:`${st}日連続です。まずは14日連続を次の目標にして良さそうです。`});else if(st>=1)r.push({type:"neutral",title:"継続",text:`${st}日連続です。まずは7日連続を目指しましょう。`});if(w!==null){if(wp!==null){const diff=w-wp;if(diff<-.2)r.push({type:"good",title:"体重",text:`直近7日平均は ${w.toFixed(1)} kg。前週より ${Math.abs(diff).toFixed(1)} kg 下がっています。良い流れです。`});else if(diff>.2)r.push({type:"warn",title:"体重",text:`直近7日平均は ${w.toFixed(1)} kg。前週より ${diff.toFixed(1)} kg 上がっています。食事・睡眠・運動量を軽く見直すタイミングです。`});else r.push({type:"neutral",title:"体重",text:`直近7日平均は ${w.toFixed(1)} kg。前週から大きな変化はなく、安定しています。`})}else r.push({type:"neutral",title:"体重",text:`直近7日平均は ${w.toFixed(1)} kg。もう少し記録がたまると前週比較できます。`})}if(sl!==null){if(sl>=7)r.push({type:"good",title:"睡眠",text:`睡眠時間の直近7日平均は ${sl.toFixed(1)} h。かなり良い水準です。`});else if(sl>=6)r.push({type:"neutral",title:"睡眠",text:`睡眠時間の直近7日平均は ${sl.toFixed(1)} h。できれば7時間に近づけたいところです。`});else r.push({type:"warn",title:"睡眠",text:`睡眠時間の直近7日平均は ${sl.toFixed(1)} h。やや短めです。まずは6.5時間以上を目標にしましょう。`});if(sp!==null&&sl-sp<-.5)r.push({type:"warn",title:"睡眠トレンド",text:`睡眠時間が前週より ${Math.abs(sl-sp).toFixed(1)} h 減っています。疲労感や集中力低下に注意です。`})}if(walk!==null){if(walk>=3)r.push({type:"good",title:"ウォーキング",text:`ウォーキング距離の直近7日平均は ${walk.toFixed(1)} km。かなり良い活動量です。`});else r.push({type:"neutral",title:"ウォーキング",text:`ウォーキング距離の直近7日平均は ${walk.toFixed(1)} km。まずは1日3km前後を目安にすると良さそうです。`});if(walkp!==null&&walk-walkp>.5)r.push({type:"good",title:"活動量",text:"ウォーキング距離が前週より増えています。体重管理にも良い影響が期待できます。"})}if(run!==null&&run>0)r.push({type:"good",title:"ランニング",text:`ランニング距離の直近7日平均は ${run.toFixed(1)} km。膝の違和感がある日は無理せず調整しましょう。`});if(eng!==null){if(eng>=20)r.push({type:"good",title:"英語",text:`英語学習の直近7日平均は ${eng.toFixed(0)} 分。継続できています。`});else r.push({type:"neutral",title:"英語",text:`英語学習の直近7日平均は ${eng.toFixed(0)} 分。短時間でも毎日続ける方針でOKです。`});if(engp!==null&&eng-engp>5)r.push({type:"good",title:"英語トレンド",text:"英語学習時間が前週より増えています。隙間時間の使い方が良い方向です。"})}if(read!==null&&read>=10)r.push({type:"good",title:"読書",text:`読書時間の直近7日平均は ${read.toFixed(0)} 分。インプット習慣として良いペースです。`});if(!r.length){c.innerHTML=`<div class="ai-review-item ai-review-neutral"><div class="ai-review-title">まだレビューはありません</div><div>体重・睡眠・ウォーキング・英語などを数日分入力すると、自動レビューが表示されます。</div></div>`;return}c.innerHTML=`<div class="ai-review-list">${r.map(x=>`<div class="ai-review-item ai-review-${x.type}"><div class="ai-review-title">${x.title}</div><div>${x.text}</div></div>`).join("")}</div>`}
function getPrevious7DayAverage(c,f){const t=new Date(logDate.value),e=addDays(t,-7),ds=getDateRange(e,6),v=getValuesForDates(ds,c,f);return v.length?average(v):null}
function renderCalendar(){const c=document.getElementById("calendarBox");if(!c)return;const s=new Date(logDate.value),y=s.getFullYear(),m=s.getMonth(),fd=new Date(y,m,1),ld=new Date(y,m+1,0),sw=fd.getDay(),dim=ld.getDate(),ml=`${y}-${String(m+1).padStart(2,"0")}`;let cells="";["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>cells+=`<div class="calendar-day-name">${d}</div>`);for(let i=0;i<sw;i++)cells+=`<div class="calendar-day empty"></div>`;for(let d=1;d<=dim;d++){const key=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`,lg=hasAnyLog(key),sel=key===logDate.value;cells+=`<button class="calendar-day ${lg?"logged":""} ${sel?"selected":""}" onclick="selectCalendarDate('${key}')"><div class="calendar-date">${d}</div><div class="calendar-dot">${lg?"●":""}</div></button>`}c.innerHTML=`<div class="calendar-head"><button class="secondary mini" onclick="moveMonth(-1)">前月</button><div class="calendar-title">${ml}</div><button class="secondary mini" onclick="moveMonth(1)">次月</button></div><div class="calendar-grid">${cells}</div>`}
function selectCalendarDate(k){logDate.value=k;render()}function moveMonth(o){const c=new Date(logDate.value);c.setMonth(c.getMonth()+o);c.setDate(1);logDate.value=c.toISOString().slice(0,10);render()}
function countInputs(l){let c=0;Object.values(l).forEach(fs=>Object.values(fs).forEach(v=>{if(v!==undefined&&v!==null&&String(v).trim()!=="")c++}));return c}
function get7DayAverage(c,f){const ds=getDateRange(new Date(logDate.value),6),v=getValuesForDates(ds,c,f);return v.length?average(v):null}
function renderHabits(){const c=document.getElementById("habitList"),tl=getTodayLog();c.innerHTML="";habits.forEach((h,hi)=>{if(!tl[h.name])tl[h.name]={};const hd=document.createElement("div");hd.className="habit";hd.innerHTML=`<div class="habit-head"><div class="habit-title">${h.name}</div><button class="secondary mini" onclick="deleteHabit(${hi})">削除</button></div><div id="fields-${hi}"></div><div class="add-field-row"><input id="addFieldName-${hi}" placeholder="内訳名 例：距離"><input id="addFieldUnit-${hi}" placeholder="単位"><button class="secondary mini" onclick="addField(${hi})">追加</button></div>`;c.appendChild(hd);const fd=document.getElementById(`fields-${hi}`);h.fields.forEach((f,fi)=>{const val=getLogValue(tl,h.name,f.name),act=selectedChart&&selectedChart.category===h.name&&selectedChart.field===f.name,row=document.createElement("div");row.className="field-row";row.innerHTML = `
<label>${f.name}</label>

<div class="field-main">

  ${f.unit ? `
    <button class="secondary mini"
      onclick="stepValue('${escapeJs(h.name)}','${escapeJs(f.name)}',-1)">
      −
    </button>
  ` : ""}

  <input
    type="${f.unit ? "number" : "text"}"
    inputmode="${f.unit ? "decimal" : "text"}"
    value="${escapeHtml(val)}"
    onchange="updateLog('${escapeJs(h.name)}','${escapeJs(f.name)}',this.value)"
    placeholder="入力"
  />

  ${f.unit ? `
    <button class="secondary mini"
      onclick="stepValue('${escapeJs(h.name)}','${escapeJs(f.name)}',1)">
      ＋
    </button>
  ` : ""}

</div>

<div class="unit">
  ${f.unit || ""}
</div>

<div class="field-actions">

  ${f.unit==="分" ? `
    <div class="quick-buttons">
      <button class="secondary mini"
        onclick="quickAdd('${escapeJs(h.name)}','${escapeJs(f.name)}',10)">
        +10
      </button>

      <button class="secondary mini"
        onclick="quickAdd('${escapeJs(h.name)}','${escapeJs(f.name)}',15)">
        +15
      </button>

      <button class="secondary mini"
        onclick="quickAdd('${escapeJs(h.name)}','${escapeJs(f.name)}',30)">
        +30
      </button>
    </div>

function getLogValue(dl,c,f){if(!dl[c])return"";if(dl[c][f]!==undefined)return dl[c][f];if(c==="体重"&&f==="数値"&&dl[c]["kg"]!==undefined)return dl[c]["kg"];if(c==="体脂肪率"&&f==="数値"&&dl[c]["%"]!==undefined)return dl[c]["%"];return""}

  let current =
    parseFloat(todayLog[category][field]) || 0;

  render();

function renderStreak(){const c=document.getElementById("streakBox");if(!c)return;const st=calculateStreak(new Date(logDate.value)),ttl=countLoggedDays();c.innerHTML=`<div class="streak-main">${st} 日連続</div><div class="streak-sub">選択日からさかのぼった連続記録日数</div><div class="streak-badge">累計記録日数 ${ttl} 日</div>`}
function calculateStreak(e){let c=0,cur=new Date(e);while(true){const k=cur.toISOString().slice(0,10);if(hasAnyLog(k)){c++;cur.setDate(cur.getDate()-1)}else break}return c}

function renderMonthlySummary(){
  const c=document.getElementById("monthlySummary");
  if(!c)return;

  const s=new Date(logDate.value);
  const y=s.getFullYear();

  `;
}

function averageOrNull(values){
  if(!values.length)return null;
  return average(values);
}

function sumValuesForDates(dates,category,field){
  return getValuesForDates(dates,category,field)
    .reduce((sum,value)=>sum+value,0);
}  
function getValuesForDates(ds,c,f){return ds.map(d=>{const rv=getStoredValue(d,c,f),nv=parseFloat(String(rv).replace(/[^\d.-]/g,""));return Number.isFinite(nv)?nv:null}).filter(v=>v!==null)}
function getStoredValue(d,c,f){const l=logs[d];if(!l||!l[c])return undefined;if(l[c][f]!==undefined)return l[c][f];if(c==="体重"&&f==="数値")return l[c]["kg"];if(c==="体脂肪率"&&f==="数値")return l[c]["%"];return undefined}
function getUnit(c,f){const h=habits.find(x=>x.name===c);if(!h)return"";const fo=h.fields.find(x=>x.name===f);return fo?fo.unit:""}
function average(v){return v.reduce((s,x)=>s+x,0)/v.length}function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}function getDateRange(e,b){const ds=[];for(let i=b;i>=0;i--){const d=addDays(e,-i);ds.push(d.toISOString().slice(0,10))}return ds}
